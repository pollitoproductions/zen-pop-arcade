<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
<style>
  body { 
    margin: 0; padding: 0; 
    background-color: #1a1a1a; 
    overflow: hidden; 
    font-family: 'Segoe UI', sans-serif;
    touch-action: none; 
    user-select: none;
    -webkit-user-select: none;
  }
  
  canvas { display: block; }

  #ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    box-sizing: border-box;
  }

  .hud-top { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
    width: 100%;
  }
  
  .stat-box { 
    text-align: center; 
    pointer-events: none; 
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 1px 2px black; }
  .value { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 5px; text-shadow: 0 2px 4px black; }

  .icon-btn {
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.15); 
    border: 2px solid rgba(0, 0, 0, 0.6); 
    color: #fff;
    width: 40px; height: 40px;
    border-radius: 50%;
    margin-top: 5px;
    cursor: pointer;
    display: flex; 
    justify-content: center; align-items: center;
    backdrop-filter: blur(2px);
    transition: transform 0.1s, background 0.2s;
    outline: none;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  
  .icon-btn svg { width: 24px; height: 24px; fill: #fff; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
  .icon-btn:hover { background: rgba(255,255,255,0.3); }
  .icon-btn:active { transform: scale(0.90); }

  @media (max-height: 500px) and (orientation: landscape) {
    .hud-top { padding: 0 20px; top: 10px; }
    .stat-box { align-items: flex-start; }
    .stat-box:last-child { align-items: flex-end; }
    .value { font-size: 20px; }
    .icon-btn { width: 30px; height: 30px; margin-top: 5px; }
    .icon-btn svg { width: 18px; height: 18px; }
  }

  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column; 
    justify-content: center; align-items: center;
    pointer-events: auto;
    z-index: 100;
    transition: opacity 0.3s;
    text-align: center;
  }
  
  #overlay h2 { 
    color: #fff; 
    font-family: 'Limelight', cursive;
    font-size: 64px;
    letter-spacing: 2px;
    margin: 0 0 10px 0; 
    text-shadow: 0 0 15px rgba(255, 75, 43, 0.6);
  }
  
  #overlay p { color: #ccc; font-size: 18px; margin: 0 0 30px 0; max-width: 80%; line-height: 1.4; padding: 0 20px; }
  
  .btn {
    background: linear-gradient(135deg, #ff4b2b, #ff8c42);
    border: none;
    color: #fff;
    padding: 12px 30px;
    font-size: 18px;
    border-radius: 25px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
    outline: none;
    font-weight: 600;
    letter-spacing: 1px;
  }
  
  .btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 75, 43, 0.6); }
  .btn:active { transform: scale(0.98); }
</style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div class="hud-top">
      <div class="stat-box">
        <div class="label">Pops</div>
        <div class="value" id="popCount">0</div>
      </div>
      <div class="stat-box">
        <div class="label">Zen Pop Lounge</div>
        <button id="muteBtn" class="icon-btn" title="Toggle Sound">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.26 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
      </div>
      <div class="stat-box">
        <div class="label">Score</div>
        <div class="value" id="scoreDisplay">0</div>
      </div>
    </div>
  </div>

  <div id="overlay" style="opacity: 0; pointer-events: none;">
    <h2>ZEN POP</h2>
    <p>Relax and pop balloons to lounge music</p>
    <button class="btn" id="startBtn">START GAME</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
